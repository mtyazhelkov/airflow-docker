version: '3'
services:
  # Постгрес база в отдельном контейнере
  postgres:
    # Устанавливаем готовый образ
    image: postgres
    # Задаем глобальные переменные для доступа к PG, пароль убираем в файл .env
    environment:
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASS}
      - POSTGRES_USER=airflow
      - POSTGRES_DB=airflow
    restart: always
    ports:
      - 5434:5432
    volumes:
      - pgdata_student:/var/lib/postgresql/data/18/main
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Airflow в отдельном контейнере
  airflow:
    # Сборка из Dockerfile
    build: 
      context: .
      args:
        POSTGRES_PASSWORD: ${AIRFLOW_DB_PASS}
        FERNET_KEY: ${FERNET_KEY}
    restart: always
    # Определяет порядок запуска сервисов
    # Будем ждать postgres
    depends_on:
      - postgres
    # Пробрасываем порты
    ports:
      - 8001:8080
    # Добавляем путь /project в PYTHONPATH, чтобы Python видел папку scripts
    environment:
      - PYTHONPATH=${PYTHONPATH}:/project
    # Пробрасываем папку с дагами
    volumes:
      - ./airflow/dags:/usr/local/airflow/dags
      - ./airflow/plugins:/root/airflow/plugins
      - ./scripts:/project/scripts
      - logs:/usr/local/airflow/logs
    entrypoint: ["/bin/bash", "/project/scripts/init.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
  #Запуск Adminer
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080 

    logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"

# Задав таким образом вольюмы
# нам не нужно заботиться о том где будет папка
# В которой они будут лежать
# Для баз данных и логов такой способ более простой и безопасный
volumes:
  pgdata_student:
  logs:
